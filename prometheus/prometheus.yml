global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'ancient-books-monitor'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'backend'
    scrape_interval: 10s
    metrics_path: /metrics
    static_configs:
      - targets: ['backend:8000']

  - job_name: 'clickhouse'
    scrape_interval: 30s
    metrics_path: /metrics
    static_configs:
      - targets: ['clickhouse:9363']

  - job_name: 'emqx'
    scrape_interval: 30s
    metrics_path: /api/v5/prometheus/auth
    static_configs:
      - targets: ['emqx:18083']
