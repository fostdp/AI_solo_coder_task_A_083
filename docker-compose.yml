version: '3.8'

services:
  clickhouse:
    image: clickhouse/clickhouse-server:23.8
    container_name: ancient-books-clickhouse
    restart: unless-stopped
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      CLICKHOUSE_DB: ancient_medical_books
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  emqx:
    image: emqx/emqx:5.3.0
    container_name: ancient-books-emqx
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "8083:8083"
      - "8084:8084"
      - "18083:18083"
    volumes:
      - emqx_data:/opt/emqx/data
    environment:
      EMQX_NAME: ancient_books_broker
      EMQX_NODE_NAME: emqx@node1.emqx.local
    healthcheck:
      test: ["CMD", "emqx", "ctl", "status"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ancient-books-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      clickhouse:
        condition: service_healthy
      emqx:
        condition: service_started
    environment:
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=9000
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=
      - MQTT_BROKER=emqx
      - MQTT_PORT=1883
      - MQTT_USERNAME=
      - MQTT_PASSWORD=
      - CONFIG_PATH=/app/config.yaml
      - LOG_LEVEL=INFO
    volumes:
      - ./backend/config.yaml:/app/config.yaml:ro
    command: ["python", "run.py"]

  simulator:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ancient-books-simulator
    restart: unless-stopped
    depends_on:
      emqx:
        condition: service_started
    environment:
      - MQTT_BROKER=emqx
      - MQTT_PORT=1883
      - SENSOR_COUNT=70
      - REPORT_INTERVAL=300
      - EXTREME_MODE=false
      - DRIFT_ENABLED=true
      - DRIFT_RATE=0.001
    command: ["python", "-m", "simulator.sensor_simulator", "--broker", "emqx", "--port", "1883", "--sensors", "70", "--interval", "300"]

  nginx:
    image: nginx:1.25-alpine
    container_name: ancient-books-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: ancient-books-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'

volumes:
  clickhouse_data:
  emqx_data:
  prometheus_data:
